server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/genshin-db?useSSL=false&serverTimezone=UTC
    username: root
    password: 932811
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  # MyBatis-Plus 配置
mybatis-plus:
  # 实体类包扫描（自动识别实体类）
  type-aliases-package: com.caomao.genshin.entity
  # 开启驼峰命名自动转换（数据库下划线 → 实体驼峰）
  configuration:
    map-underscore-to-camel-case: true
