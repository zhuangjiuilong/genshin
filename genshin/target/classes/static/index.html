<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原神角色数据获取</title>
</head>
<body>
    <label for="avatarId">角色 ID:</label>
    <input type="text" id="avatarId" placeholder="输入角色 ID">
    <button onclick="fetchAvatarData()">确认</button>
    <div id="result"></div>

    <script>
        function fetchAvatarData() {
            const avatarId = document.getElementById('avatarId').value;
            const apiUrl = `http://localhost:8080/api/avatars/${avatarId}`;

            fetch(apiUrl)
              .then(response => response.text())
              .then(data => {
                    document.getElementById('result').innerHTML = data;
                })
              .catch(error => {
                    document.getElementById('result').innerHTML = `请求出错: ${error.message}`;
                });
        }
    </script>
</body>
</html>
